services:
  app-dev:
    build:
      context: .
      target: development
    container_name: desafio01-calculador-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      HOST: "0.0.0.0"
    stdin_open: true
    tty: true

  app-prod:
    build:
      context: .
      target: production
    container_name: desafio01-calculador-prod
    ports:
      - "8080:80"
